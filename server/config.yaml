# =============================================================================
# 抽烟检测服务端 配置文件
# =============================================================================
# 修改此文件后重启服务即可生效，无需改动任何代码。
# =============================================================================

# -----------------------------------------------------------------------------
# 模型参数
# -----------------------------------------------------------------------------
model:
  path: "runs/detect/yolo26s_smoking_20260625_0033/weights/best.pt"   # YOLO 权重路径（相对于项目根目录）
  conf: 0.35                                                           # 置信度阈值
  device: 0                                                            # GPU 设备 ID，null 或 "cpu" 表示 CPU

# -----------------------------------------------------------------------------
# 摄像头列表
# -----------------------------------------------------------------------------
# 每路摄像头需提供: id（唯一标识）、name（显示名称）、type（rtsp/local）、enabled（是否启用）
# type=rtsp 时需填 rtsp_url；type=local 时可选填 device_id（默认 0）
cameras:
  - id: "gate"
    name: "测试"
    type: "local"                                                       # rtsp | local，默认 rtsp
    # rtsp_url: "rtsp://118.140.130.26:8554/dahua1003362"
    enabled: true

  # --- 本地摄像头（USB / 内置），测试用 ---
  # - id: "local_webcam"
  #   name: "本地摄像头"
  #   type: "local"
  #   device_id: 0                                                     # 0=默认摄像头
  #   enabled: false

# -----------------------------------------------------------------------------
# 告警参数
# -----------------------------------------------------------------------------
alert:
  cooldown_seconds: 10           # 同一摄像头两次告警的最小间隔（秒）
  min_detection_count: 1         # 连续检测到抽烟的帧数阈值（防止单帧误报）
  save_dir: "alerts"             # 关键帧保存目录（相对于项目根目录）

  webhook:
    url: "http://localhost:9999/api/smoke-alert"   # Webhook 接收地址
    timeout: 10                                     # 请求超时（秒）
    retries: 2                                      # 失败重试次数

# -----------------------------------------------------------------------------
# 日志参数
# -----------------------------------------------------------------------------
log:
  level: "INFO"        # DEBUG / INFO / WARNING / ERROR
  file: null           # 日志文件路径，null 表示只输出到控制台
