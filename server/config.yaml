# =============================================================================
# 抽烟检测服务端 配置文件
# =============================================================================
# 修改此文件后重启服务即可生效，无需改动任何代码。
# =============================================================================

# -----------------------------------------------------------------------------
# 模型参数
# -----------------------------------------------------------------------------
model:
  path: "runs/detect/yolo26m_smoking_20260626_0601/weights/best.pt"   # 抽烟模型权重路径（第二阶段，相对于项目根目录）
  person_model:                                                       # 可选：人体检测模型（第一阶段），不配置则回退为单阶段模式
    path: "yolo26n.pt"                                                # COCO 预训练模型，class 0 = person
    conf: 0.4                                                         # 人体检测置信度阈值
  conf: 0.35                                                           # 抽烟检测置信度阈值
  device: 0                                                            # GPU 设备 ID，null 或 "cpu" 表示 CPU
  target_classes: ['cigarette']                                         # 触发告警的目标类别（必须与模型类别名一致）

# -----------------------------------------------------------------------------
# 摄像头列表
# -----------------------------------------------------------------------------
# 每路摄像头需提供: id（唯一标识）、name（显示名称）、type（rtsp/local）、enabled（是否启用）
# type=rtsp 时需填 rtsp_url；type=local 时可选填 device_id（默认 0）
cameras:
  - id: "gate"
    name: "测试"
    type: "local"                                                       # rtsp | local，默认 rtsp
    # rtsp_url: "rtsp://118.140.130.26:8554/dahua1003362"
    enabled: true

  # --- 本地摄像头（USB / 内置），测试用 ---
  # - id: "local_webcam"
  #   name: "本地摄像头"
  #   type: "local"
  #   device_id: 0                                                     # 0=默认摄像头
  #   enabled: false

# -----------------------------------------------------------------------------
# 告警参数
# -----------------------------------------------------------------------------
alert:
  cooldown_seconds: 10           # 同一摄像头两次告警的最小间隔（秒）
  min_detection_count: 1         # 连续检测到抽烟的帧数阈值（防止单帧误报）
  save_frame_overlay: false      # 是否在证据帧上叠加摄像头名称/时间水印（摄像头流已自带则无需）

  webhook:
    url: "http://localhost:9999/api/smoke-alert"   # Webhook 接收地址
    timeout: 10                                     # 请求超时（秒）
    retries: 2                                      # 失败重试次数

# -----------------------------------------------------------------------------
# 日志参数
# -----------------------------------------------------------------------------
log:
  level: "INFO"                # DEBUG / INFO / WARNING / ERROR
  file: "logs/server.log"      # 日志文件路径（JSON 格式，自动轮转 10MB，保留 30 天）
