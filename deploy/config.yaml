# =============================================================================
# 抽烟检测服务 — 部署配置文件
# =============================================================================
# 此文件挂载到容器的 /app/server/config.yaml，修改后 docker compose restart 即可。
#
# 模型路径支持两种方式（都已经挂载到容器内）：
#   方式 A — 拷贝到 deploy/models/ 下，下方写  /models/<文件名>
#   方式 B — 直接引用 runs/ 训练产出，下方写  /runs/detect/<训练目录>/weights/best.pt
# =============================================================================

# -----------------------------------------------------------------------------
# 模型参数
# -----------------------------------------------------------------------------
model:
  path: "/models/best.pt"                                          # ← 模型文件在容器内的路径
  conf:                                                             # 置信度阈值：float=全局统一，dict=逐类设定
    face: 0.5
    smoking: 0.25
  device: 0                                                        # GPU 设备 ID；"cpu" 表示 CPU
  target_classes: ['face', 'smoking']                             # 触发告警的目标类别名（需同时存在）

# -----------------------------------------------------------------------------
# 摄像头列表
# -----------------------------------------------------------------------------
# type=rtsp 时填写 rtsp_url，容器内 RTSPStreamer（底层 cv2.VideoCapture）
# 同时支持 HTTP MJPEG 流——测试时配合 local/camera_stream.py 使用
cameras:
  - id: "720"
    name: "dahua720"
    type: "rtsp"
    rtsp_url: "rtsp://118.140.234.166:8554/dahua1001722"
    enabled: true

# -----------------------------------------------------------------------------
# 告警参数
# -----------------------------------------------------------------------------
alert:
  cooldown_seconds: 10            # 同摄像头两次告警最小间隔（秒）
  min_detection_count: 1          # 连续检测到目标的帧数阈值
  save_frame_overlay: false       # 是否在证据帧上叠加水印

  webhook:
    url: "http://192.168.1.37:6071/ECHO/api/v1/webhook/smoking-alarm"  # 宿主机 webhook 接收器
    timeout: 10                                               # 请求超时（秒）
    retries: 2                                                # 失败重试次数

# -----------------------------------------------------------------------------
# 日志参数
# -----------------------------------------------------------------------------
log:
  level: "INFO"                    # DEBUG | INFO | WARNING | ERROR
  file: "/logs/server.log"         # 容器内固定路径，映射到宿主机 deploy/logs/
